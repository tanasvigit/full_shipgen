name: React Console Playwright

on:
  pull_request:
    paths:
      - 'react-console/**'
      - '.github/workflows/react-console-playwright.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'react-console/**'
      - '.github/workflows/react-console-playwright.yml'
  workflow_dispatch:

jobs:
  playwright:
    name: Playwright (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium
          - firefox
          - webkit
          - mobile-chrome
          - mobile-safari

    defaults:
      run:
        working-directory: react-console

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: react-console/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run Playwright tests
        run: npm run test:e2e -- --project=${{ matrix.project }}

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-${{ matrix.project }}
          path: |
            react-console/playwright-report
            react-console/test-results
          if-no-files-found: ignore
